# Pre-commit hooks. Install once with:
#   pip install pre-commit  (or your distro's package)
#   pre-commit install
#
# Runs gitleaks for secret scanning and basic hygiene on every commit.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=25000']
      - id: check-merge-conflict
      - id: detect-private-key
