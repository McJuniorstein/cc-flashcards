# Pre-commit hooks. Install once with:
#   pip install pre-commit  (or your distro's package)
#   pre-commit install
#
# Runs gitleaks for secret scanning and basic hygiene on every commit.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Extracted source markdown is the canonical anchor for card verification
        # (its sha256 lands in every card's source_hash field). It must be
        # byte-identical to whatever Marker produced - hygiene hooks must not
        # mutate it.
        exclude: ^sources/extracted/
      - id: end-of-file-fixer
        exclude: ^sources/extracted/
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=25000']
      - id: check-merge-conflict
      - id: detect-private-key
