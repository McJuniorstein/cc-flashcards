# Netlify build + headers configuration.
# To be validated against securityheaders.com and Mozilla Observatory before public launch,
# per the pre-launch security checklist in docs/planning/.

[build]
  # Build command populated when the app exists. Placeholder for now.
  publish = "app/dist"
  command = "echo 'no app yet'"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    # Strict CSP. Tighten further once the analytics endpoint is finalised.
    # No unsafe-inline, no unsafe-eval, self-hosted everything.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
